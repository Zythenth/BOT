services:
  aurora:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/storage/aurora.db
    volumes:
      - aurora-storage:/app/storage
    command: sh -c "npm run prisma:migrate:deploy && npm run start"

volumes:
  aurora-storage:
